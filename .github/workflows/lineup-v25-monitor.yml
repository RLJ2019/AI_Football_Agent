name: V25 Line-up Monitor

on:
  schedule:
    # GitHub cron is UTC. This lightweight monitor runs every 15 minutes during
    # the main European football window and only acts when a fixture is T-65..T-45.
    - cron: "*/15 9-23 * * *"
  workflow_dispatch:

concurrency:
  group: v25-football-agent-state
  cancel-in-progress: false

jobs:
  lineup-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      TELEGRAM_ENABLED: "true"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      LIVE_SHEET_URL: ${{ vars.LIVE_SHEET_URL || '' }}
      LOCAL_OUTPUT_DIR: "output"
      REQUIRE_FINAL_LINEUP_FOR_VALUE_PICK: "true"
      MAX_ODDS_AGE_MINUTES: "90"
      SEND_DAILY_REPORT: "false"
      SEND_VALUE_ALERTS: "true"
      SEND_HEARTBEAT: "false"
      ONLY_WATCHLIST_LINEUP_MONITOR: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore output cache
        uses: actions/cache@v4
        with:
          path: output/
          key: v25-lineup-output-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            v25-lineup-output-${{ runner.os }}-
            v25-output-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run line-up monitor
        run: |
          python -m football_agent.scripts.run_lineup_monitor

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v25-lineup-monitor-output
          path: output/
          if-no-files-found: ignore
