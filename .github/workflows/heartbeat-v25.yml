name: V25 Premium Heartbeat

on:
  schedule:
    # Silent reassurance update near the end of the main football day.
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: v25-football-agent-state
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      TELEGRAM_ENABLED: "true"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      LIVE_SHEET_URL: ${{ vars.LIVE_SHEET_URL || '' }}
      LOCAL_OUTPUT_DIR: "output"
      SEND_DAILY_REPORT: "false"
      SEND_VALUE_ALERTS: "false"
      SEND_HEARTBEAT: "true"
      HEARTBEAT_MIN_HOUR_UTC: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore output cache
        uses: actions/cache@v4
        with:
          path: output/
          key: v25-heartbeat-output-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            v25-heartbeat-output-${{ runner.os }}-
            v25-output-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run heartbeat
        run: |
          python -m football_agent.scripts.run_heartbeat

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v25-heartbeat-output
          path: output/
          if-no-files-found: ignore
