name: Daily V25 Multi-League Agent

on:
schedule:
- cron: “0 6 * * *”
workflow_dispatch:

concurrency:
group: v25-football-agent-state
cancel-in-progress: false

permissions:
contents: read

jobs:
run-agent:
runs-on: ubuntu-latest
timeout-minutes: 45

env:
  FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
  API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
  TELEGRAM_ENABLED: "true"
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  LOCAL_OUTPUT_DIR: "output"
  DAYS_AHEAD: "7"
  MAX_MATCHES: "30"
  FIXTURE_TEST_MODE: "false"
  FIXTURE_DATE_FROM: ""
  FIXTURE_DATE_TO: ""
  FIXTURE_SEASON: ""
  FIXTURE_SOURCE: "auto"
  MIN_DATA_QUALITY: "7.0"
  MIN_CONFIDENCE: "7.0"
  MIN_EDGE: "0.04"
  REQUIRE_ODDS_FOR_VALUE_PICK: "true"
  MAX_ODDS_AGE_MINUTES: "180"
  REQUIRE_FINAL_LINEUP_FOR_VALUE_PICK: "true"
  MAX_VALUE_PICKS_PER_COMPETITION: "3"
  MAX_VALUE_PICKS_PER_TEAM: "1"
  MAX_VALUE_PICKS_PER_FIXTURE: "1"
  MAX_TOTAL_UNITS_PER_DAY: "3.0"
  KELLY_FRACTION: "0.25"
  BANKROLL_UNITS: "100"
  MAX_UNITS_PER_PICK: "2.0"
  MIN_UNITS_FOR_VALUE_PICK: "0.25"
  SEND_DAILY_REPORT: "true"
  SEND_VALUE_ALERTS: "true"
  SEND_HEARTBEAT: "true"
  HEARTBEAT_MIN_HOUR_UTC: "17"
  LIVE_SHEET_URL: ${{ secrets.LIVE_SHEET_URL }}
  GOOGLE_SHEET_WEBHOOK_URL: ${{ secrets.LIVE_SHEET_URL }}
  INTERNATIONAL_BREAK_DAYS_AFTER: "7"
  INTERNATIONAL_BREAK_WINDOWS: ${{ vars.INTERNATIONAL_BREAK_WINDOWS || '' }}
  ONLY_LINEUP_WINDOW: "false"
  ONLY_WATCHLIST_LINEUP_MONITOR: "false"
  LINEUP_WINDOW_START_MINUTES: "65"
  LINEUP_WINDOW_END_MINUTES: "45"
steps:
  - name: Checkout repository
    uses: actions/checkout@v4
  - name: Restore output cache
    uses: actions/cache@v4
    with:
      path: output/
      key: v25-output-${{ runner.os }}-${{ github.run_id }}
      restore-keys: |
        v25-output-${{ runner.os }}-
  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"
      cache: "pip"
  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
  - name: Run tests
    run: |
      python smoke_test.py
      python -m unittest discover -s tests
  - name: Show live configuration
    run: |
      echo "FIXTURE_TEST_MODE=$FIXTURE_TEST_MODE"
      echo "FIXTURE_SOURCE=$FIXTURE_SOURCE"
      echo "DAYS_AHEAD=$DAYS_AHEAD"
      echo "MAX_MATCHES=$MAX_MATCHES"
      echo "SEND_DAILY_REPORT=$SEND_DAILY_REPORT"
      echo "SEND_VALUE_ALERTS=$SEND_VALUE_ALERTS"
      echo "SEND_HEARTBEAT=$SEND_HEARTBEAT"
  - name: Run Daily Agent
    run: |
      python run_agent.py
  - name: Upload output artifacts
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: v25-daily-agent-output
      path: output/
      if-no-files-found: ignore
      retention-days: 14