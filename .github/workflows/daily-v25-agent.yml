name: V25 Historical Test 2024

on:
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

      TELEGRAM_ENABLED: "true"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      LOCAL_OUTPUT_DIR: "output"

      DAYS_AHEAD: "60"
      MAX_MATCHES: "20"

      CONFIG_MARKER: "HISTORICAL-TEST-2024"
      FIXTURE_TEST_MODE: "true"
      FIXTURE_DATE_FROM: "2024-09-13"
      FIXTURE_DATE_TO: "2024-09-16"
      FIXTURE_SEASON: "2024"
      FIXTURE_SOURCE: "api_football"

      MIN_DATA_QUALITY: "7.0"
      MIN_CONFIDENCE: "7.0"
      MIN_EDGE: "0.04"

      REQUIRE_ODDS_FOR_VALUE_PICK: "true"
      MAX_ODDS_AGE_MINUTES: "180"
      REQUIRE_FINAL_LINEUP_FOR_VALUE_PICK: "true"

      MAX_VALUE_PICKS_PER_COMPETITION: "3"
      MAX_VALUE_PICKS_PER_TEAM: "1"
      MAX_VALUE_PICKS_PER_FIXTURE: "1"
      MAX_TOTAL_UNITS_PER_DAY: "3.0"

      KELLY_FRACTION: "0.25"
      BANKROLL_UNITS: "100"
      MAX_UNITS_PER_PICK: "2.0"

      SEND_DAILY_REPORT: "false"
      SEND_VALUE_ALERTS: "false"
      SEND_HEARTBEAT: "false"
      HEARTBEAT_MIN_HOUR_UTC: "17"

      LIVE_SHEET_URL: ${{ secrets.LIVE_SHEET_URL }}
      GOOGLE_SHEET_WEBHOOK_URL: ${{ secrets.LIVE_SHEET_URL }}

      INTERNATIONAL_BREAK_DAYS_AFTER: "7"
      INTERNATIONAL_BREAK_WINDOWS: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show active configuration
        run: |
          echo "CONFIG_MARKER=$CONFIG_MARKER"
          echo "FIXTURE_TEST_MODE=$FIXTURE_TEST_MODE"
          echo "FIXTURE_DATE_FROM=$FIXTURE_DATE_FROM"
          echo "FIXTURE_DATE_TO=$FIXTURE_DATE_TO"
          echo "FIXTURE_SEASON=$FIXTURE_SEASON"
          echo "FIXTURE_SOURCE=$FIXTURE_SOURCE"

      - name: Run tests
        run: |
          python smoke_test.py
          python -m unittest discover -s tests

      - name: Run historical agent test
        run: |
          python run_agent.py

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v25-historical-test-output
          path: output/
          if-no-files-found: ignore