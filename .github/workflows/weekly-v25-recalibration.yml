name: Weekly V25 Candidate Recalibration

on:
  schedule:
    # Monday 04:00 UTC. Candidate only; no blind auto-push to production weights.
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: v25-football-agent-state
  cancel-in-progress: false

jobs:
  recalibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      LOCAL_OUTPUT_DIR: "output"
      TRAINING_LOG: "output/prediction_log.csv"
      CANDIDATE_WEIGHTS_OUTPUT: "output/candidate_learned_model_weights.json"
      WEIGHT_TRAINING_REPORT: "output/weight_training_report.json"
      MIN_TRAINING_ROWS: "100"
      PROMOTE_WEIGHTS: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore output cache
        uses: actions/cache@v4
        with:
          path: output/
          key: v25-output-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            v25-output-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tests
        run: |
          python smoke_test.py
          python -m unittest discover -s tests

      - name: Generate candidate weights
        run: |
          python -m football_agent.scripts.run_weight_training

      - name: Upload recalibration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v25-candidate-recalibration
          path: output/
          if-no-files-found: ignore
